<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MOR.NEVEN</title>
    <meta
      name="description"
      content="MOR.NEVEN ceramic studio portfolio board."
    />
    <link rel="icon" type="image/png" href="./assets/favicon-moon.png" />
    <link rel="apple-touch-icon" href="./assets/favicon-moon.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="stage" aria-label="MOR.NEVEN ceramic studio">
      <section class="brand-lockup" aria-labelledby="brand-title">
        <h1 id="brand-title">MOR.NEVEN</h1>
        <img
          class="brand-mark"
          src="./assets/morneven-logo.png"
          alt=""
          aria-hidden="true"
        />
      </section>

      <figure
        class="piece piece-wide"
        style="--x: 5; --y: 9; --mobile-x: 4; --mobile-y: 9; --w: 172px; --r: -4deg; --delay: 40ms"
        tabindex="0"
        data-detail="Hands-on clay shaping from a MOR.NEVEN workshop table."
      >
        <img src="./assets/pottery-01.jpeg" alt="Hands shaping clay at MOR.NEVEN" />
        <figcaption>CLAY STUDY</figcaption>
      </figure>

      <figure
        class="piece piece-portrait"
        style="--x: 67; --y: 11; --mobile-x: 64; --mobile-y: 9; --w: 114px; --r: 5deg; --delay: 120ms"
        tabindex="0"
        data-detail="A pair of hand-painted bowls with small floral marks."
      >
        <img src="./assets/pottery-02.jpeg" alt="Two hand-painted ceramic bowls" />
        <figcaption>PAINTED BOWLS</figcaption>
      </figure>

      <figure
        class="piece piece-wide"
        style="--x: 73; --y: 53; --mobile-x: 64; --mobile-y: 57; --w: 176px; --r: 3deg; --delay: 220ms"
        tabindex="0"
        data-detail="Playful drawings and color studies fired onto shallow plates."
      >
        <img src="./assets/pottery-03.jpeg" alt="Colorful plates arranged on a shelf" />
        <figcaption>DRAWN PLATES</figcaption>
      </figure>

      <figure
        class="piece piece-wide"
        style="--x: 16; --y: 61; --mobile-x: 4; --mobile-y: 65; --w: 184px; --r: 4deg; --delay: 300ms"
        tabindex="0"
        data-detail="Finished bowls and cups arranged on a wooden studio shelf."
      >
        <img src="./assets/pottery-04.jpeg" alt="Ceramic pieces on a wooden shelf" />
        <figcaption>SHELF PIECES</figcaption>
      </figure>

      <figure
        class="piece piece-portrait"
        style="--x: 48; --y: 18; --mobile-x: 38; --mobile-y: 24; --w: 112px; --r: -5deg; --delay: 180ms"
        tabindex="0"
        data-detail="Green-glazed bowl and speckled cup from the shelf series."
      >
        <img src="./assets/pottery-05.jpeg" alt="Green bowl and speckled mug on a shelf" />
        <figcaption>CELADON CUP</figcaption>
      </figure>

      <figure
        class="piece piece-portrait"
        style="--x: 35; --y: 45; --mobile-x: 31; --mobile-y: 48; --w: 132px; --r: -2deg; --delay: 380ms"
        tabindex="0"
        data-detail="Small hand-built clay figures before firing."
      >
        <img src="./assets/pottery-06.jpeg" alt="Small clay characters on a work table" />
        <figcaption>TABLE CREATURES</figcaption>
      </figure>

      <figure
        class="piece piece-wide"
        style="--x: 58; --y: 66; --mobile-x: 58; --mobile-y: 73; --w: 178px; --r: -3deg; --delay: 480ms"
        tabindex="0"
        data-detail="Ceramic flower holders paired with dried stems."
      >
        <img src="./assets/pottery-07.jpeg" alt="Small ceramic flower holders" />
        <figcaption>FLOWER HOLDERS</figcaption>
      </figure>

      <figure
        class="piece piece-wide"
        style="--x: 21; --y: 23; --mobile-x: 5; --mobile-y: 33; --w: 174px; --r: 2deg; --delay: 560ms"
        tabindex="0"
        data-detail="Plants, shelves, and ceramic pieces inside the studio."
      >
        <img src="./assets/pottery-08.jpeg" alt="Studio plants and ceramic pieces" />
        <figcaption>STUDIO PLANTS</figcaption>
      </figure>
    </main>

    <nav class="studio-dock" aria-label="MOR.NEVEN links">
      <a
        class="dock-link dock-link--instagram"
        href="https://www.instagram.com/mor.neven/"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="MOR.NEVEN Instagram"
      >
        <img class="dock-link__logo" src="./assets/dock-instagram.svg" alt="" />
        <span class="dock-link__label">Instagram</span>
      </a>

      <a
        class="dock-link dock-link--kakao"
        href="https://pf.kakao.com/_ZbRZX"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="MOR.NEVEN KakaoTalk channel"
      >
        <img class="dock-link__logo" src="./assets/dock-kakao.svg" alt="" />
        <span class="dock-link__label">Kakao</span>
      </a>

      <a
        class="dock-link dock-link--booking"
        href="https://booking.naver.com/booking/6/bizes/1623253"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="MOR.NEVEN Naver booking"
      >
        <img class="dock-link__logo" src="./assets/dock-naver-booking-20260519.webp" alt="" />
        <span class="dock-link__label">Booking</span>
      </a>

      <a
        class="dock-link dock-link--map"
        href="https://naver.me/Ix0GyLKI"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="MOR.NEVEN Naver map"
      >
        <img class="dock-link__logo" src="./assets/dock-naver-map.webp" alt="" />
        <span class="dock-link__label">Map</span>
      </a>
    </nav>

    <button class="image-manager-trigger" type="button" aria-label="Manage images">
      +
    </button>

    <div class="modal-layer" aria-hidden="true"></div>

    <div class="auth-overlay" aria-hidden="true">
      <section
        class="auth-panel"
        role="dialog"
        aria-modal="true"
        aria-labelledby="auth-title"
        tabindex="-1"
      >
        <header class="auth-header">
          <h2 id="auth-title">Admin</h2>
          <button class="auth-close" type="button" aria-label="Close">×</button>
        </header>

        <form class="auth-form">
          <input
            class="auth-username"
            type="text"
            autocomplete="username"
            value="admin"
            aria-hidden="true"
            tabindex="-1"
          />
          <label class="manager-field">
            <span>Password</span>
            <input
              class="auth-password"
              type="password"
              autocomplete="current-password"
              required
            />
          </label>
          <button class="auth-submit" type="submit">Unlock</button>
          <p class="auth-status" role="status"></p>
        </form>
      </section>
    </div>

    <div class="manager-overlay" aria-hidden="true">
      <section
        class="manager-panel"
        role="dialog"
        aria-modal="true"
        aria-labelledby="manager-title"
        tabindex="-1"
      >
        <header class="manager-header">
          <h2 id="manager-title">Images</h2>
          <button class="manager-close" type="button" aria-label="Close">×</button>
        </header>

        <div class="manager-actions">
          <p class="manager-count">0 / 20</p>
          <label class="manager-add">
            Add
            <input class="manager-file" type="file" accept="image/*" multiple />
          </label>
        </div>

        <div class="manager-draft" hidden>
          <div class="manager-draft-head">
            <h3>New images</h3>
            <div class="manager-draft-actions">
              <button class="manager-cancel" type="button">Cancel</button>
              <button class="manager-save" type="button">Save</button>
            </div>
          </div>
          <div class="manager-draft-list"></div>
        </div>

        <div class="manager-grid" aria-live="polite"></div>
        <p class="manager-status" role="status"></p>
      </section>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
